<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Events</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            color: #2c3e50;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        /* Events List Container */
        ul {
            list-style: none;
            padding: 0;
            width: 100%;
            max-width: 600px;
        }

        /* Individual Event Cards */
        li {
            background: white;
            margin-bottom: 15px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-left: 5px solid #27ae60; /* Green accent */
            transition: transform 0.2s;
            font-size: 1.2rem;
            color: #34495e;
        }

        li:hover {
            transform: scale(1.02);
            background-color: #fff;
        }

        /* Back Button Styling */
        .back-link {
            margin-top: 30px;
            text-decoration: none;
            color: white;
            background-color: #3498db;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .back-link:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <h2>Upcoming Events</h2>

    <ul>
        <li>🌊 Beach Cleanup</li>
        <li>🌳 Tree Planting</li>
        <li>🍎 Food Donation</li>
    </ul>

    <a href="/" class="back-link">← Back Home</a>

</body>
</html>
